<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="theme-color" content="#171009" />
  <title>Houblon — Micro-brasseries</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@500;600;700&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
        integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />

  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <!-- Barre du haut : marque + rayon de recherche -->
  <header class="topbar">
    <div class="brand">
      <svg class="brand-mark" viewBox="0 0 24 24" aria-hidden="true">
        <path d="M6 8h9a3 3 0 0 1 0 6h-1v3a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2V8z" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round"/>
        <path d="M14 10h1a1.6 1.6 0 0 1 0 3.2h-1" fill="none" stroke="currentColor" stroke-width="1.6"/>
        <path d="M8.2 8c-.6-1.4.2-2.6 1.4-2.8M11 8c-.5-1.6.4-3 1.7-3.1M13.6 8c-.4-1.2.3-2.3 1.3-2.5" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
      </svg>
      <div class="brand-text">
        <span class="brand-name">HOUBLON</span>
        <span class="brand-tag">micro-brasseries autour de vous</span>
      </div>
    </div>

    <div class="radius" role="group" aria-label="Rayon de recherche">
      <span class="radius-label">Rayon</span>
      <div class="radius-chips" id="radiusChips">
        <button class="chip" data-radius="2000">2</button>
        <button class="chip is-active" data-radius="5000">5</button>
        <button class="chip" data-radius="10000">10</button>
        <button class="chip" data-radius="25000">25</button>
        <span class="radius-unit">km</span>
      </div>
    </div>
  </header>

  <!-- Carte -->
  <main class="stage">
    <div id="map"></div>

    <!-- Bandeau d'etat (chargement / erreurs) -->
    <div id="status" class="status" hidden></div>

    <!-- Bouton flottant : se localiser -->
    <button id="locateBtn" class="fab" aria-label="Me localiser et chercher">
      <svg viewBox="0 0 24 24" aria-hidden="true">
        <circle cx="12" cy="12" r="3.2" fill="none" stroke="currentColor" stroke-width="1.8"/>
        <path d="M12 2v3M12 19v3M2 12h3M19 12h3" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
      </svg>
    </button>
  </main>

  <!-- Liste des brasseries facon "carte des bieres" -->
  <section class="sheet" id="sheet" aria-label="Liste des brasseries">
    <button class="sheet-head" id="sheetToggle" aria-expanded="false">
      <span class="sheet-grip" aria-hidden="true"></span>
      <span class="sheet-title" id="sheetTitle">Appuyez sur le bouton de localisation</span>
      <span class="sheet-caret" aria-hidden="true">
        <svg viewBox="0 0 24 24"><path d="M6 15l6-6 6 6" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </span>
    </button>
    <ul class="taplist" id="taplist"></ul>
  </section>

  <!-- Fiche detaillee d'une brasserie -->
  <div class="detail" id="detail" hidden>
    <div class="detail-panel" role="dialog" aria-modal="true" aria-labelledby="detailName">
      <button class="detail-back" id="detailBack" aria-label="Retour">
        <svg viewBox="0 0 24 24"><path d="M15 6l-6 6 6 6" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
        Retour
      </button>
      <div class="detail-body" id="detailBody"></div>
    </div>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
          integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
  <script src="js/app.js"></script>
</body>
</html>
